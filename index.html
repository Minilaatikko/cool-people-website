<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cool Person Checker</title>
</head>
<body>
    <h1>Name a cool person:</h1>

    <input
        type="text"
        id="name"
        placeholder="Enter a name..."
        onkeydown="if(event.key === 'Enter') checkName();">

    <button onclick="checkName()">Submit</button>

    <p id="result"></p>

    <script src="script.js"></script>
</body>
</html>
